<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pick a Song</title>
</head>
<body>

  <h2>Which song do you prefer?</h2>

  <input type="radio" name="song" id="songA" value="Bohemian Rhapsody">
  <label for="songA">Bohemian Rhapsody - Queen</label><br><br>

  <input type="radio" name="song" id="songB" value="Hotel California">
  <label for="songB">Hotel California - Eagles</label><br><br>

  <button onclick="next()">Next</button>

  <script>
    function next() {
      const pick = document.querySelector('input[name="song"]:checked');
      if (!pick) { alert('Please pick a song first!'); return; }
      alert('You chose: ' + pick.value);
    const pick = document.querySelector('input[name="song"]:checked');
    if (!pick) { alert('Please pick a song first!'); return; }

    if (pick.value === "Bohemian Rhapsody") {
      window.location.href = "page-a.html";
    } else {
      window.location.href = "page-b.html";
    }
  }
</script>


</body>
</html>
