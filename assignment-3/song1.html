<!DOCTYPE html>
<html lang="en">
<head>
  <title>Art Song Game </title>
</head>
<body style="font-family:'Courier New'">
    <center> 
<style>
div {
font-size: 25px;
width: 850px;
}

</style>
<div>
  <h2>Which Exhibit Are You? Welcome to exhibit matching website for the Princeton Art Museum!</h2>
  <h4>Make your pick below:</h4>


  <input type="radio" name="song" id="songA" value="song1">
  <label for="songA">"Clair de Lune" - Debussy</label><br><br>

<audio controls>  

<source src="Clair-de-lune.mp3" type="audio/mpeg">
</audio>
<br>
</br>
  <input type="radio" name="song" id="songB" value="Hotel California">
  <label for="songB">"TEXAS HOLD 'EM" - Beyoncé</label><br><br>

<audio controls>
  <source src="texas-hold-em.mp3" type="audio/mpeg">
</audio>
<br>
</br>
  <button onclick="next()">Next</button>

  <script>
   function next() {
    const pick = document.querySelector('input[name="song"]:checked');


    if (pick.value === "song1") {
      window.location.href = "song1a.html";
    } else {
      window.location.href = "song1b.html";
    }
  }
</script>
</div>

</center>
</body>
</html>
