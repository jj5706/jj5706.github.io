<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Choice Quiz</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    #quiz-container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #subtitle {
      font-size: 1rem;
      color: #a8b2d8;
      margin-bottom: 30px;
    }

    #progress-bar-wrapper {
      background: #1e2a4a;
      border-radius: 50px;
      height: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 50px;
      transition: width 0.4s ease;
      width: 0%;
    }

    #progress-text {
      font-size: 0.85rem;
      color: #a8b2d8;
      margin-bottom: 28px;
    }

    #question-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    #question-text {
      font-size: 1.2rem;
      color: #ccd6f6;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .choice-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 20px 16px;
      cursor: pointer;
      color: #fff;
      transition: all 0.25s ease;
      text-align: left;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
      transform: translateY(-2px);
    }

    .choice-btn .song-title {
      font-size: 1.05rem;
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
    }

    .choice-btn .song-artist {
      font-size: 0.85rem;
      color: #a8b2d8;
      display: block;
    }

    .choice-btn .song-genre {
      font-size: 0.75rem;
      color: #f5a623;
      display: block;
      margin-top: 4px;
    }

    .choice-btn.correct {
      border-color: #00d084;
      background: rgba(0, 208, 132, 0.2);
    }

    .choice-btn.wrong {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.2);
    }

    .choice-btn:disabled {
      cursor: default;
    }

    #vs-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: #f5a623;
      letter-spacing: 1px;
    }

    .vs-inner {
      background: rgba(245, 166, 35, 0.15);
      border: 2px solid #f5a623;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #feedback {
      min-height: 52px;
      font-size: 1rem;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }

    #feedback.show { display: block; }

    #feedback.correct-fb {
      background: rgba(0, 208, 132, 0.15);
      border: 1px solid #00d084;
      color: #00d084;
    }

    #feedback.wrong-fb {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid #e94560;
      color: #ff8fa3;
    }

    #next-btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 40px;
      transition: opacity 0.2s;
      display: none;
      letter-spacing: 1px;
    }

    #next-btn:hover { opacity: 0.85; }

    #results-screen {
      display: none;
      text-align: center;
    }

    #results-screen h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #e94560;
    }

    #score-display {
      font-size: 4rem;
      font-weight: 900;
      margin: 20px 0;
    }

    #score-message {
      font-size: 1.1rem;
      color: #a8b2d8;
      margin-bottom: 30px;
    }

    #restart-btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 40px;
      transition: opacity 0.2s;
      letter-spacing: 1px;
    }

    #restart-btn:hover { opacity: 0.85; }

    .score-bar-wrap {
      background: #1e2a4a;
      border-radius: 50px;
      height: 14px;
      max-width: 300px;
      margin: 0 auto 12px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 50px;
      transition: width 0.8s ease;
    }

    @media (max-width: 520px) {
      .choices { grid-template-columns: 1fr; }
      #vs-badge { display: none; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div id="quiz-container">
    <h1>Song Choice Quiz</h1>
    <p id="subtitle">Pick the song that matches the clue!</p>

    <div id="quiz-screen">
      <div id="progress-bar-wrapper">
        <div id="progress-bar"></div>
      </div>
      <p id="progress-text">Question 1 of 10</p>

      <div id="question-card">
        <p id="question-text"></p>
        <div class="choices">
          <button class="choice-btn" id="choice-a" onclick="selectAnswer(0)">
            <span class="song-title"></span>
            <span class="song-artist"></span>
            <span class="song-genre"></span>
          </button>
          <div id="vs-badge"><div class="vs-inner">VS</div></div>
          <button class="choice-btn" id="choice-b" onclick="selectAnswer(1)">
            <span class="song-title"></span>
            <span class="song-artist"></span>
            <span class="song-genre"></span>
          </button>
        </div>
      </div>

      <div id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>

    <div id="results-screen">
      <h2>Quiz Complete!</h2>
      <div id="score-display"></div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="score-bar-fill"></div>
      </div>
      <p id="score-message"></p>
      <button id="restart-btn" onclick="restartQuiz()">Play Again</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        clue: "This song starts with an iconic piano riff and is about a girl the narrator can't get out of his head. Released in the 1980s.",
        songs: [
          { title: "Take On Me", artist: "a-ha", genre: "Synth-pop" },
          { title: "Sweet Child O' Mine", artist: "Guns N' Roses", genre: "Hard Rock" }
        ],
        answer: 0,
        explanation: '"Take On Me" by a-ha (1985) features that famous synth keyboard intro!'
      },
      {
        clue: "This pop anthem samples Destiny's Child and is about the importance of self-confidence.",
        songs: [
          { title: "Call Me Maybe", artist: "Carly Rae Jepsen", genre: "Pop" },
          { title: "Run the World (Girls)", artist: "Beyoncé", genre: "R&B/Pop" }
        ],
        answer: 1,
        explanation: '"Run the World (Girls)" by Beyoncé samples "Pon de Floor" and celebrates female empowerment!'
      },
      {
        clue: "This 2019 hit spent 19 weeks at #1 on the Billboard Hot 100, the longest run ever at the time.",
        songs: [
          { title: "Old Town Road", artist: "Lil Nas X ft. Billy Ray Cyrus", genre: "Country Rap" },
          { title: "Shape of You", artist: "Ed Sheeran", genre: "Pop" }
        ],
        answer: 0,
        explanation: '"Old Town Road" by Lil Nas X held the record with 19 weeks at #1!'
      },
      {
        clue: "This 2008 country-pop hit features the lyric \"I hate that stupid old pickup truck\" and became a massive crossover success.",
        songs: [
          { title: "You Belong With Me", artist: "Taylor Swift", genre: "Country Pop" },
          { title: "You're So Vain", artist: "Carly Simon", genre: "Soft Rock" }
        ],
        answer: 0,
        explanation: '"You Belong With Me" from Taylor Swift\'s Fearless (2008) features the truck lyric!'
      },
      {
        clue: "This alternative rock song from 1991 is about teen alienation and features a baby swimming after a dollar bill in its music video.",
        songs: [
          { title: "Smells Like Teen Spirit", artist: "Nirvana", genre: "Grunge" },
          { title: "Losing My Religion", artist: "R.E.M.", genre: "Alternative Rock" }
        ],
        answer: 0,
        explanation: '"Smells Like Teen Spirit" by Nirvana — the iconic video features a swimming baby!'
      },
      {
        clue: "This protest song was recorded in one day and donated all proceeds to the NAACP Legal Defense Fund.",
        songs: [
          { title: "This Is America", artist: "Childish Gambino", genre: "Hip-hop/R&B" },
          { title: "Hell You Talmbout", artist: "Janelle Monáe", genre: "Funk/Protest" }
        ],
        answer: 1,
        explanation: '"Hell You Talmbout" by Janelle Monáe was recorded in one day and proceeds went to the NAACP!'
      },
      {
        clue: "This rock-and-roll classic was used in the 1994 film Pulp Fiction during a famous dance contest scene.",
        songs: [
          { title: "You Never Can Tell", artist: "Chuck Berry", genre: "Rock and Roll" },
          { title: "Girl, You'll Be a Woman Soon", artist: "Urge Overkill", genre: "Rock" }
        ],
        answer: 0,
        explanation: '"You Never Can Tell" by Chuck Berry played during the Mia Wallace & Vincent Vega dance scene!'
      },
      {
        clue: "This reggaeton hit from 2017 became the most-streamed song on Spotify in a single day at the time.",
        songs: [
          { title: "Despacito", artist: "Luis Fonsi ft. Daddy Yankee", genre: "Reggaeton" },
          { title: "Mi Gente", artist: "J Balvin ft. Willy William", genre: "Reggaeton" }
        ],
        answer: 0,
        explanation: '"Despacito" by Luis Fonsi broke the Spotify single-day streaming record in 2017!'
      },
      {
        clue: "This classic rock song from a concept album became the biggest-selling single of 1980 and features schoolchildren chanting.",
        songs: [
          { title: "Don't Fear the Reaper", artist: "Blue Öyster Cult", genre: "Rock" },
          { title: "Another Brick in the Wall", artist: "Pink Floyd", genre: "Progressive Rock" }
        ],
        answer: 1,
        explanation: '"Another Brick in the Wall (Part II)" by Pink Floyd features chanting children and topped charts in 1980!'
      },
      {
        clue: "This Grammy-winning hip-hop collaboration references a famous US city in its title but the video was filmed elsewhere.",
        songs: [
          { title: "Empire State of Mind", artist: "Jay-Z ft. Alicia Keys", genre: "Hip-hop" },
          { title: "Miami", artist: "Will Smith", genre: "Hip-hop/Pop" }
        ],
        answer: 0,
        explanation: '"Empire State of Mind" won the Grammy for Best Rap Song in 2010!'
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      const q = questions[currentIndex];
      answered = false;

      document.getElementById('progress-text').textContent =
        `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById('progress-bar').style.width =
        `${(currentIndex / questions.length) * 100}%`;
      document.getElementById('question-text').textContent = q.clue;

      const btnA = document.getElementById('choice-a');
      const btnB = document.getElementById('choice-b');

      btnA.querySelector('.song-title').textContent = q.songs[0].title;
      btnA.querySelector('.song-artist').textContent = q.songs[0].artist;
      btnA.querySelector('.song-genre').textContent = q.songs[0].genre;
      btnA.className = 'choice-btn';
      btnA.disabled = false;

      btnB.querySelector('.song-title').textContent = q.songs[1].title;
      btnB.querySelector('.song-artist').textContent = q.songs[1].artist;
      btnB.querySelector('.song-genre').textContent = q.songs[1].genre;
      btnB.className = 'choice-btn';
      btnB.disabled = false;

      const feedback = document.getElementById('feedback');
      feedback.textContent = '';
      feedback.className = '';
      document.getElementById('next-btn').style.display = 'none';
    }

    function selectAnswer(chosen) {
      if (answered) return;
      answered = true;

      const q = questions[currentIndex];
      const isCorrect = chosen === q.answer;
      const btnA = document.getElementById('choice-a');
      const btnB = document.getElementById('choice-b');
      btnA.disabled = true;
      btnB.disabled = true;

      const feedback = document.getElementById('feedback');
      if (isCorrect) {
        score++;
        (chosen === 0 ? btnA : btnB).classList.add('correct');
        feedback.textContent = '✓ Correct! ' + q.explanation;
        feedback.className = 'show correct-fb';
      } else {
        (chosen === 0 ? btnA : btnB).classList.add('wrong');
        (q.answer === 0 ? btnA : btnB).classList.add('correct');
        feedback.textContent = '✗ Not quite. ' + q.explanation;
        feedback.className = 'show wrong-fb';
      }

      document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('results-screen').style.display = 'block';

      const pct = Math.round((score / questions.length) * 100);
      document.getElementById('score-display').textContent = `${score} / ${questions.length}`;
      setTimeout(() => {
        document.getElementById('score-bar-fill').style.width = pct + '%';
      }, 100);

      let msg;
      if (pct === 100) msg = "Perfect score! You're a music genius!";
      else if (pct >= 80) msg = "Great job! You really know your music.";
      else if (pct >= 60) msg = "Not bad! Keep listening and you'll ace it next time.";
      else if (pct >= 40) msg = "A little more listening practice and you'll get there!";
      else msg = "Tough round! Give it another try and see how much you learn.";
      document.getElementById('score-message').textContent = msg;
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      document.getElementById('results-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
