<!DOCTYPE html>
<html lang="en">
<head>
  <title>Art Song Game </title>
</head>
<body style="font-family:'Courier New'">
    <center> 
<style>
div {
font-size: 25px;
width: 850px;
}

</style>
<div>
  <h2>Which Exhibit Are You? Welcome to exhibit matching website for the Princeton Art Museum!</h2>
  <h4>Make your pick below</h4>



  <input type="radio" name="song" id="songA" value="Bohemian Rhapsody">
  <label for="songA">"Golden Hour" – JVKE </label><br><br>
<audio controls>  

<source src="golden hour.mp3" type="audio/mpeg">
</audio>
<br>
</br>

  <input type="radio" name="song" id="songB" value="Hotel California">
  <label for="songB">"Alright" – Kendrick Lamar</label><br><br>
<audio controls>  

<source src="alright.mp3" type="audio/mpeg">
</audio>
<br>
</br>
  <button onclick="next()">Next</button>

  <script>
    function next() {
      const pick = document.querySelector('input[name="song"]:checked');
    
    if (pick.value === "Bohemian Rhapsody") {
      window.location.href = "song1b-a.html";
    } else {
      window.location.href = "song1b-b.html";
    }
  }


</script>
    </center> 
</div>
</body>
</html>
