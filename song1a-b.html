<!DOCTYPE html>
<html lang="en">
<head>
  <title>Art Song Game </title>
</head>
<body style="font-family:'Courier New'">
    <center> 
<style>
div {
font-size: 25px;
width: 850px;
}

</style>
<div>
  <h2>Which Exhibit Are You? Welcome to exhibit matching website for the Princeton Art Museum!</h2>
  <h4>Make your pick below</h4>


  <input type="radio" name="song" id="songA" value="Bohemian Rhapsody">
  <label for="songA">"Comptine d'un autre été" – Yann Tiersen</label><br><br>
<audio controls>  

<source src="yann.mp3" type="audio/mpeg">
</audio>
<br>
</br>

  <input type="radio" name="song" id="songB" value="Hotel California">
  <label for="songB">"Holocene" – Bon Iver</label><br><br>
<audio controls>  

<source src="Holocene.mp3" type="audio/mpeg">
</audio>
<br>
</br>
  <button onclick="next()">Next</button>

  <script>
    function next() {
      const pick = document.querySelector('input[name="song"]:checked');
     

    if (pick.value === "Bohemian Rhapsody") {
      window.location.href = "euroart.html";
    } else {
      window.location.href = "photo.html";
    }
  }
</script>

</script>
    </center> 
</div>
</body>
</html>
